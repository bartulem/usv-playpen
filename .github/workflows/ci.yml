name: tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "*"

# Least-privilege GITHUB_TOKEN for all jobs (CodeQL actions/missing-workflow-permissions):
# both jobs only read the repo, and Codecov upload authenticates with CODECOV_TOKEN
# (not the GITHUB_TOKEN / OIDC), so read-only contents is sufficient.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3

  # Opt every JavaScript action into the Node.js 24 runtime ahead of the
  # 2026-06-02 default-flip / 2026-09-16 Node.js 20 removal. The trigger is
  # pre-commit/action@v3.0.1 (latest release, Feb 2024), which transitively
  # loads actions/cache@v4 -- still pinned to Node.js 20 in its action.yml.
  # actions/cache@v5 is Node.js 24-native but pre-commit/action has not
  # picked it up. Forcing the runtime via this env var is GitHub's own
  # recommended interim fix from the deprecation warning. Remove the var
  # once pre-commit/action ships a release that pulls actions/cache@v5 (or
  # we replace pre-commit/action with inlined steps).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pre-commit:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"

      - uses: astral-sh/setup-uv@v7

      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --hook-stage manual --all-files

  checks:
    name: Check Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml requires Python >=3.12,<3.14 (3.12–3.13); both are
        # exercised here. 3.14 is not yet supported: numba/llvmlite have no
        # 3.14 wheel and their sdist fails to build on it.
        python-version: ["3.12", "3.13"]
        # Windows is excluded: torch and jax fail to load their native
        # libraries on the Windows runner (torch c10.dll -> WinError 1114; jax
        # _jax DLL load failure), and jax has only experimental Windows support
        # -- so this torch+jax stack is not a viable Windows CI target. (The
        # recording branch is Windows-only, but needs proprietary hardware no
        # runner has, so it cannot be CI-tested anywhere regardless.) Linux +
        # macOS cover the platform-independent processing / analysis /
        # visualization branches the suite exercises.
        runs-on: [ubuntu-latest, macos-latest]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@v7

      - name: Install Qt deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 \
            libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0 \
            libxcb-keysyms1 libxcb-image0 libxcb-render-util0 \
            xvfb

      - name: Install package
        run: uv sync

      - name: Test package (Linux headless)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a uv run pytest -ra --cov --cov-report=xml --cov-report=term --durations=20

      - name: Test package (non-Linux)
        if: runner.os != 'Linux'
        run:
          uv run pytest -ra --cov --cov-report=xml --cov-report=term
          --durations=20

      - name: Upload coverage report
        uses: codecov/codecov-action@v7
        # Don't fail the whole job if Codecov is unreachable or the token
        # isn't configured -- the test pass/fail signal is what drives the
        # README badge and that should not depend on Codecov availability.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

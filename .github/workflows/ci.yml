name: tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3

jobs:
  pre-commit:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: astral-sh/setup-uv@v7

      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --hook-stage manual --all-files

  #      - name: Run Pylint
  #        run: uvx nox -s pylint -- --output-format=github

  checks:
    name: Check Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml requires Python >=3.11,<3.14. Pin to 3.13 for the
        # default CI run; expand to ["3.11", "3.12", "3.13"] if you want to
        # exercise every supported interpreter.
        python-version: ["3.13"]
        # Windows is intentionally excluded: the recording-side dependencies
        # (Avisoft, motifapi, imgstore wheels) are not all available on
        # Windows wheels for non-recording use. Linux + macOS cover the
        # processing / analysis / visualization branches that the test suite
        # actually exercises.
        runs-on: [ubuntu-latest, macos-latest]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@v7

      - name: Install Qt deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 \
            libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0 \
            libxcb-keysyms1 libxcb-image0 libxcb-render-util0 \
            xvfb

      - name: Install package
        run: uv sync

      - name: Test package (Linux headless)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a uv run pytest -ra --cov --cov-report=xml --cov-report=term --durations=20

      - name: Test package (non-Linux)
        if: runner.os != 'Linux'
        run:
          uv run pytest -ra --cov --cov-report=xml --cov-report=term
          --durations=20

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        # Don't fail the whole job if Codecov is unreachable or the token
        # isn't configured -- the test pass/fail signal is what drives the
        # README badge and that should not depend on Codecov availability.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

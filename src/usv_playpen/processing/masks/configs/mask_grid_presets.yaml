# AMG (SAM2AutomaticMaskGenerator) presets for Step 2 `--method grid`.
#
# Select one with `--config NAME` (default: fast). The chosen name is BOTH the AMG preset
# AND the output tag in `{session}_{NAME}.pkl` (which Step 3 reads via `--mask_config`).
# Override the file with `SPECGEN_GRID_PRESETS=FILE`.
#
# ----------------------------------------------------------------------------------------
# SPEED  <-> ACCURACY  TRADEOFF  (grid / AMG)
# ----------------------------------------------------------------------------------------
# The grid path samples a `points_per_side x points_per_side` lattice of point prompts,
# optionally over cropped sub-images (`crop_n_layers`), then NMS-merges proposals. The
# knobs that move the tradeoff:
#
#   points_per_side  ^  -> more prompts        -> finer/more masks, SLOWER  (dominant cost)
#   crop_n_layers    ^  -> re-run on crops     -> catches small masks, SLOWER
#   use_m2m=true        -> mask-to-mask refine -> cleaner edges, SLOWER
#   pred_iou_thresh  ^  -> stricter keep       -> fewer false masks, fewer total
#   stability_score  ^  -> stricter keep       -> fewer flickery masks
#   min_mask_region_area ^ -> drop small masks -> fewer tiny/noise masks
#
# Presets below run fastest -> most accurate:
#   ultra_fast < fast < balanced < precision ~ anti_large < quality < max_quality
# ----------------------------------------------------------------------------------------

# Fastest, coarsest. Sparse prompts, no crops, no refinement. Good for a quick first look.
ultra_fast:
  description:
    Fastest pass — sparse prompts, no cropping. Misses small/faint masks.
  tradeoff: { speed: fastest, accuracy: lowest }
  params:
    points_per_side: 12
    points_per_batch: 2048
    pred_iou_thresh: 0.80
    stability_score_thresh: 0.80
    stability_score_offset: 0.70
    crop_n_layers: 0
    box_nms_thresh: 0.70
    crop_n_points_downscale_factor: 1
    min_mask_region_area: 1500
    use_m2m: false

# ~3x speedup vs quality, good for horizontal bands.
fast:
  description:
    Fast default — reduced sampling, large min-area. Good for clear tonal bands.
  tradeoff: { speed: fast, accuracy: low }
  params:
    points_per_side: 16
    points_per_batch: 2048
    pred_iou_thresh: 0.80
    stability_score_thresh: 0.80
    stability_score_offset: 0.70
    crop_n_layers: 0
    box_nms_thresh: 0.70
    crop_n_points_downscale_factor: 1
    min_mask_region_area: 1000
    use_m2m: false

# ~2x speedup, good quality/speed tradeoff.
balanced:
  description: Moderate sampling, light cropping. Sensible default tradeoff.
  tradeoff: { speed: medium, accuracy: medium }
  params:
    points_per_side: 24
    points_per_batch: 1536
    pred_iou_thresh: 0.85
    stability_score_thresh: 0.85
    stability_score_offset: 0.70
    crop_n_layers: 0
    box_nms_thresh: 0.70
    crop_n_points_downscale_factor: 2
    min_mask_region_area: 100
    use_m2m: false

# Moderate sampling tuned to suppress large background masks while staying fast.
precision:
  description:
    Conservative NMS + cropping to avoid large background masks; stays fast.
  tradeoff: { speed: medium, accuracy: medium-high }
  params:
    points_per_side: 20
    points_per_batch: 1536
    pred_iou_thresh: 0.88
    stability_score_thresh: 0.88
    stability_score_offset: 0.75
    crop_n_layers: 1
    box_nms_thresh: 0.65
    crop_n_points_downscale_factor: 2
    min_mask_region_area: 400
    use_m2m: false

# Dense sampling + strict thresholds specialized to prevent large background masks.
anti_large:
  description: Dense + strict IoU/stability to prevent large background masks.
  tradeoff: { speed: slow, accuracy: high }
  params:
    points_per_side: 32
    points_per_batch: 1024
    pred_iou_thresh: 0.92
    stability_score_thresh: 0.92
    stability_score_offset: 0.80
    crop_n_layers: 1
    box_nms_thresh: 0.60
    crop_n_points_downscale_factor: 2
    min_mask_region_area: 200
    use_m2m: false

# Original SAM2 sampling, tuned for acoustic data.
quality:
  description: Dense sampling + one crop layer. Good for thin horizontal bands.
  tradeoff: { speed: slow, accuracy: high }
  params:
    points_per_side: 32
    points_per_batch: 1024
    pred_iou_thresh: 0.90
    stability_score_thresh: 0.90
    stability_score_offset: 0.70
    crop_n_layers: 1
    box_nms_thresh: 0.70
    crop_n_points_downscale_factor: 2
    min_mask_region_area: 500
    use_m2m: false

# Highest quality for final production runs (slowest).
max_quality:
  description:
    Densest sampling, two crop layers, mask-to-mask refinement. Slowest.
  tradeoff: { speed: slowest, accuracy: highest }
  params:
    points_per_side: 48
    points_per_batch: 512
    pred_iou_thresh: 0.95
    stability_score_thresh: 0.95
    stability_score_offset: 0.80
    crop_n_layers: 2
    box_nms_thresh: 0.60
    crop_n_points_downscale_factor: 2
    min_mask_region_area: 300
    use_m2m: true
